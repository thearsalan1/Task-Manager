<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square with gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <rect x="8" y="10" width="16" height="16" rx="2" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.4" stroke-width="1.2"/>

  <!-- Clipboard top clip -->
  <rect x="13" y="8" width="6" height="4" rx="1.5" fill="white" fill-opacity="0.6"/>

  <!-- Check line 1 (done) -->
  <polyline points="11,17 13,19.5 17,15" stroke="#86efac" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Line item 2 -->
  <line x1="11" y1="22" x2="21" y2="22" stroke="white" stroke-opacity="0.4" stroke-width="1.4" stroke-linecap="round"/>
</svg>